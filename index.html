<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>Parental Control</title>
  <link rel="stylesheet" href="css/tv-reset.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <script type="text/javascript" src="webOSTVjs/webOSTV.js"></script>
</head>
<body>
  <div id="app">
    <!-- Screens are rendered here dynamically -->
    <div id="screen-container">
      <div class="screen landing-screen">
        <div class="top-nav">
          <div class="brand-mark">ORBIT</div>
          <div class="nav-links"><span>TV build</span><span>Loading</span></div>
        </div>
        <div class="hero-copy">
          <div class="mission-kicker red">Family mission control</div>
          <div class="hero-title">Explore the<br>next horizon</div>
          <div class="hero-subtitle">Loading parent controls...</div>
        </div>
      </div>
    </div>
    <!-- Modal overlay (PIN entry, warnings, etc.) -->
    <div id="modal-overlay" class="modal-overlay hidden"></div>
  </div>

  <!-- Core modules -->
  <script src="js/storage.js"></script>
  <script src="js/pin.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/viewport.js"></script>
  <script src="js/screensaver.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/ui/components.js"></script>
  <script src="js/ui/screens.js"></script>
  <script src="js/ui/lockscreen.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
